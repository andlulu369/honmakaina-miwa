*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#2e1460;
  --purple-bg:#1e0a4a;
  --gold:#ffe066;
  --gold-dark:#c4973a;
  --cream:#fdfbf0;
  --text-light:#ffffff;
  --text-soft:#d4c8f0;
  --text-mid:#5a3a78;
}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--purple-bg);color:var(--text-light);}

/* NAV */
nav{background:rgba(30,10,74,0.97);border-bottom:2px solid rgba(255,224,102,0.3);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-wrap{text-decoration:none;}
.logo-sub{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;display:block;}
.logo-main{font-family:'Noto Serif JP',serif;font-size:16px;color:#fff;font-weight:600;letter-spacing:1px;}
.nav-links{display:flex;gap:20px;list-style:none;flex-wrap:wrap;}
.nav-links a{font-size:12px;color:var(--text-soft);text-decoration:none;letter-spacing:1px;padding-bottom:2px;border-bottom:1.5px solid transparent;transition:all 0.2s;}
.nav-links a:hover,.nav-links a.active{border-color:var(--gold);color:var(--gold);}
.nav-btn{background:var(--gold);color:var(--purple);border:none;padding:9px 18px;border-radius:24px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;text-decoration:none;transition:opacity 0.2s;}
.nav-btn:hover{opacity:0.85;}

/* FOOTER */
footer{background:#0e0618;padding:32px 40px;text-align:center;}
.ft-logo{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:16px;}
.ft-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:16px;}
.ft-links a{font-size:12px;color:var(--text-soft);text-decoration:none;letter-spacing:1px;}
.ft-links a:hover{color:var(--gold);}
.ft-copy{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:1px;}

/* SECTIONS */
section{padding:80px 40px;}
.sec-en{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;text-align:center;display:block;margin-bottom:8px;}
.sec-ja{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:400;color:#fff;text-align:center;letter-spacing:2px;margin-bottom:8px;}
.sec-orn{text-align:center;color:rgba(255,224,102,0.4);font-size:14px;letter-spacing:6px;margin-bottom:48px;display:block;}
.btn-gold{background:var(--gold);color:var(--purple);border:none;padding:13px 28px;border-radius:28px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;letter-spacing:1px;text-decoration:none;display:inline-block;transition:opacity 0.2s;}
.btn-gold:hover{opacity:0.85;}
.btn-outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold);padding:12px 28px;border-radius:28px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:1px;text-decoration:none;display:inline-block;}

@media(max-width:768px){
  nav{padding:12px 16px;}
  .nav-links{display:none;}
  section{padding:60px 20px;}
}


.mammoth-sec{background:var(--purple);padding:80px 40px;text-align:center;}
.mammoth-inner{max-width:600px;margin:0 auto;}
.mammoth-logo{width:200px;height:200px;object-fit:cover;border-radius:50%;border:3px solid rgba(255,224,102,0.3);margin:0 auto 32px;}
.mammoth-text{font-family:'Noto Serif JP',serif;font-size:18px;color:#fff;line-height:2;letter-spacing:1px;margin-bottom:32px;}
