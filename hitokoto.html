<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --purple:#2e1460;
  --purple-bg:#1e0a4a;
  --gold:#ffe066;
  --gold-dark:#c4973a;
  --cream:#fdfbf0;
  --text-light:#ffffff;
  --text-soft:#d4c8f0;
  --text-mid:#5a3a78;
}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--purple-bg);color:var(--text-light);}

/* NAV */
nav{background:rgba(30,10,74,0.97);border-bottom:2px solid rgba(255,224,102,0.3);padding:14px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-wrap{text-decoration:none;}
.logo-sub{font-family:'Cormorant Garamond',serif;font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;display:block;}
.logo-main{font-family:'Noto Serif JP',serif;font-size:16px;color:#fff;font-weight:600;letter-spacing:1px;}
.nav-links{display:flex;gap:20px;list-style:none;flex-wrap:wrap;}
.nav-links a{font-size:12px;color:var(--text-soft);text-decoration:none;letter-spacing:1px;padding-bottom:2px;border-bottom:1.5px solid transparent;transition:all 0.2s;}
.nav-links a:hover,.nav-links a.active{border-color:var(--gold);color:var(--gold);}
.nav-btn{background:var(--gold);color:var(--purple);border:none;padding:9px 18px;border-radius:24px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;text-decoration:none;transition:opacity 0.2s;}
.nav-btn:hover{opacity:0.85;}

/* FOOTER */
footer{background:#0e0618;padding:32px 40px;text-align:center;}
.ft-logo{font-family:'Noto Serif JP',serif;font-size:14px;color:var(--gold);letter-spacing:2px;margin-bottom:16px;}
.ft-links{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin-bottom:16px;}
.ft-links a{font-size:12px;color:var(--text-soft);text-decoration:none;letter-spacing:1px;}
.ft-links a:hover{color:var(--gold);}
.ft-copy{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:1px;}

/* SECTIONS */
section{padding:80px 40px;}
.sec-en{font-family:'Cormorant Garamond',serif;font-size:11px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;text-align:center;display:block;margin-bottom:8px;}
.sec-ja{font-family:'Noto Serif JP',serif;font-size:26px;font-weight:400;color:#fff;text-align:center;letter-spacing:2px;margin-bottom:8px;}
.sec-orn{text-align:center;color:rgba(255,224,102,0.4);font-size:14px;letter-spacing:6px;margin-bottom:48px;display:block;}
.btn-gold{background:var(--gold);color:var(--purple);border:none;padding:13px 28px;border-radius:28px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;letter-spacing:1px;text-decoration:none;display:inline-block;transition:opacity 0.2s;}
.btn-gold:hover{opacity:0.85;}
.btn-outline{background:transparent;color:var(--gold);border:1.5px solid var(--gold);padding:12px 28px;border-radius:28px;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;letter-spacing:1px;text-decoration:none;display:inline-block;}

@media(max-width:768px){
  nav{padding:12px 16px;}
  .nav-links{display:none;}
  section{padding:60px 20px;}
}


.hk-sec{background:var(--purple);padding:80px 40px;}
.hk-inner{max-width:680px;margin:0 auto;text-align:center;}
.hk-lead{font-size:15px;color:var(--text-soft);margin-bottom:40px;line-height:2;}
.hk-post-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,224,102,0.2);border-radius:16px;padding:28px 32px;text-align:left;margin-bottom:16px;animation:fadeIn 0.5s ease;}
.hk-post-card.latest{border-color:rgba(255,224,102,0.5);background:rgba(255,224,102,0.06);}
.hk-post-card-date{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:10px;}
.hk-post-card-badge{display:inline-block;font-size:9px;background:var(--gold);color:var(--purple);padding:2px 8px;border-radius:10px;margin-left:8px;font-weight:700;letter-spacing:1px;vertical-align:middle;}
.hk-post-card-text{font-size:16px;color:#fff;line-height:2;font-weight:300;}
.hk-loading{font-size:14px;color:var(--text-soft);padding:32px;text-align:center;}
.hk-note{font-size:11px;color:var(--text-soft);margin-top:16px;letter-spacing:1px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

</style>

<section class="hk-sec">
  <span class="sec-en">Daily Message</span>
  <h1 class="sec-ja">今日の一言</h1>
  <span class="sec-orn">✦</span>
  <div class="hk-inner">

    <div id="hkLatest"><div class="hk-loading">読み込み中… 💫</div></div>

<script>
(function() {
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSVY30lRPqr-mucKEEW9d0480hgKw2KEywN91pKIaPsSXo-AB5l5csUy9jZ_f95SAyVLpdkfE-OyzsZ/pub?gid=1532049572&single=true&output=csv";
  const latestEl = document.getElementById('hkLatest');
  const postsEl = document.getElementById('hkPosts');

  function parseCSV(text) {
    const lines = text.trim().split('\n');
    const rows = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = [];
      let cur = '', inQ = false;
      for (let c of lines[i]) {
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur.trim());
      if (cols.length >= 3 && cols[0]) rows.push(cols);
    }
    return rows;
  }

  function fetchPosts() {
    fetch(CSV_URL)
      .then(r => r.text())
      .then(text => {
        const rows = parseCSV(text);
        if (!rows || rows.length === 0) {
          latestEl.innerHTML = '<div class="hk-post-card latest"><div class="hk-post-card-date">お楽しみに...</div><div class="hk-post-card-text">みわからの一言をお届けします 💕</div></div>';
          return;
        }
        latestEl.innerHTML = '';
        postsEl.innerHTML = '';
        const recent = rows.slice().reverse().slice(0, 5);
        recent.forEach((cols, i) => {
          const dateStr = cols[1] || '';
          const msgStr = cols[2] || '';
          if (!msgStr) return;
          const card = document.createElement('div');
          card.className = 'hk-post-card' + (i === 0 ? ' latest' : '');
          card.innerHTML = '<div class="hk-post-card-date">' + dateStr +
            (i === 0 ? '<span class="hk-post-card-badge">NEW</span>' : '') + '</div>' +
            '<div class="hk-post-card-text">' + msgStr + '</div>';
          if (i === 0) latestEl.appendChild(card);
          else postsEl.appendChild(card);
        });
      })
      .catch(() => {
        latestEl.innerHTML = '<div class="hk-post-card latest"><div class="hk-post-card-date">お楽しみに...</div><div class="hk-post-card-text">みわからの一言をお届けします 💕</div></div>';
      });
  }

  fetchPosts();
  setInterval(fetchPosts, 120000);
})();
</script>
